<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>塔羅牌抽牌軟體</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', 'Heiti TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .settings-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }

        .spread-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-draw {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-draw:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        .btn-reset:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #28a745;
            color: white;
        }

        .btn-copy:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .results-section {
            display: none;
            margin-top: 40px;
        }

        .results-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .result-header h2 {
            margin-bottom: 10px;
        }

        .result-meta {
            font-size: 14px;
            opacity: 0.9;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card-item {
            background: white;
            border: 3px solid #667eea;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .card-position {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .card-orientation {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .card-orientation.upright {
            background: #d4edda;
            color: #155724;
        }

        .card-orientation.reversed {
            background: #f8d7da;
            color: #721c24;
        }

        .card-keywords {
            margin-bottom: 15px;
        }

        .card-keywords strong {
            color: #667eea;
        }

        .keyword-tag {
            display: inline-block;
            background: #e7f0ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 5px;
            margin: 3px;
            font-size: 14px;
        }

        .card-description {
            color: #666;
            line-height: 1.6;
            margin-top: 10px;
        }

        .summary-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .summary-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .summary-text {
            line-height: 1.8;
            color: #555;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .cards-container {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: 100%;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 塔羅牌抽牌軟體</h1>
        
        <div class="settings-section">
            <div class="form-group">
                <label for="question">您的問題（可選）：</label>
                <textarea id="question" placeholder="請輸入您想要詢問的問題..."></textarea>
            </div>

            <div class="form-group">
                <label for="spread">牌陣：</label>
                <select id="spread" disabled>
                    <option value="three-card">三張牌（過去/現在/未來）</option>
                </select>
                <div class="spread-info">
                    📋 此牌陣使用三張牌，分別代表：過去、現在、未來
                </div>
            </div>

            <div class="form-group">
                <label for="reversed">逆位設定：</label>
                <select id="reversed">
                    <option value="true">允許逆位</option>
                    <option value="false">不允許逆位</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn-draw" onclick="drawCards()">🎴 抽牌</button>
                <button class="btn-reset" onclick="resetAll()">🔄 重置</button>
                <button class="btn-copy" onclick="copyResults()">📋 複製結果</button>
            </div>
        </div>

        <div id="results" class="results-section">
            <div class="result-header">
                <h2>抽牌結果</h2>
                <div class="result-meta">
                    <div>📅 抽牌時間：<span id="drawTime"></span></div>
                    <div>🎴 牌陣：三張牌（過去/現在/未來）</div>
                    <div>🔄 逆位設定：<span id="reversedSetting"></span></div>
                    <div id="questionDisplay" class="hidden">❓ 問題：<span id="questionText"></span></div>
                </div>
            </div>

            <div id="cardsContainer" class="cards-container"></div>

            <div class="summary-section">
                <h3>📖 整體解讀</h3>
                <div id="summaryText" class="summary-text"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">已複製到剪貼簿！</div>

                upright: {
                    keywords: ["幻覺", "恐懼", "潛意識", "不確定"],
                    desc: "月亮代表幻覺、恐懼和潛意識的影響。事情可能不如表面所見，需要穿越迷霧找到真相。"
                },
                reversed: {
                    keywords: ["釋放恐懼", "清晰", "真相顯露", "克服焦慮"],
                    desc: "逆位的月亮表示恐懼逐漸消散，真相開始浮現。你正在克服內在的焦慮和不確定感。"
                }
            },
            {
                id: "19-sun",
                name: "太陽 The Sun",
                arcana: "major",
                upright: {
                    keywords: ["成功", "喜悅", "活力", "光明"],
                    desc: "太陽象徵純粹的喜悅、成功和光明。這是最正面的牌之一，預示著幸福、活力和所有事物的繁榮。"
                },
                reversed: {
                    keywords: ["暫時低落", "過度樂觀", "延遲成功", "缺乏熱情"],
                    desc: "逆位的太陽可能表示暫時的低落或延遲的成功。樂觀仍在，但可能需要更多時間才能完全綻放。"
                }
            },
            {
                id: "20-judgement",
                name: "審判 Judgement",
                arcana: "major",
                upright: {
                    keywords: ["覺醒", "反思", "重生", "呼召"],
                    desc: "審判代表重大的覺醒和人生的呼召。反思過去，做出重要決定，迎接全新的人生階段。"
                },
                reversed: {
                    keywords: ["自我懷疑", "逃避責任", "後悔", "錯失機會"],
                    desc: "逆位的審判暗示自我批判過度或逃避重要的決定。可能對過去感到後悔，需要寬恕自己。"
                }
            },
            {
                id: "21-world",
                name: "世界 The World",
                arcana: "major",
                upright: {
                    keywords: ["完成", "成就", "整合", "圓滿"],
                    desc: "世界代表完成、成就和圓滿。一個重要的循環結束，你已達成目標，準備好迎接新的旅程。"
                },
                reversed: {
                    keywords: ["未完成", "延遲", "缺乏閉合", "停滯"],
                    desc: "逆位的世界表示事情尚未完成或延遲。可能缺乏閉合感，需要完成剩餘的工作才能前進。"
                }
            }
        ];

        let currentDraw = null;

        // Fisher-Yates 洗牌演算法
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 抽牌函數
        function drawCards() {
            const question = document.getElementById('question').value.trim();
            const allowReversed = document.getElementById('reversed').value === 'true';
            
            // 洗牌並抽取3張
            const shuffledDeck = shuffleArray(DECK);
            const drawnCards = shuffledDeck.slice(0, 3);
            
            // 處理正逆位
            const cardsWithOrientation = drawnCards.map((card, index) => {
                const isReversed = allowReversed && Math.random() < REVERSED_PROBABILITY;
                return {
                    card: card,
                    position: SPREAD_POSITIONS[index],
                    isReversed: isReversed,
                    cardData: isReversed ? card.reversed : card.upright
                };
            });
            
            currentDraw = {
                timestamp: new Date(),
                question: question,
                allowReversed: allowReversed,
                cards: cardsWithOrientation
            };
            
            displayResults();
        }

        // 顯示結果
        function displayResults() {
            if (!currentDraw) return;
            
            const resultsSection = document.getElementById('results');
            const drawTime = document.getElementById('drawTime');
            const reversedSetting = document.getElementById('reversedSetting');
            const questionDisplay = document.getElementById('questionDisplay');
            const questionText = document.getElementById('questionText');
            const cardsContainer = document.getElementById('cardsContainer');
            const summaryText = document.getElementById('summaryText');
            
            // 更新時間和設定
            drawTime.textContent = currentDraw.timestamp.toLocaleString('zh-TW');
            reversedSetting.textContent = currentDraw.allowReversed ? '允許逆位' : '不允許逆位';
            
            // 顯示問題（如果有）
            if (currentDraw.question) {
                questionDisplay.classList.remove('hidden');
                questionText.textContent = currentDraw.question;
            } else {
                questionDisplay.classList.add('hidden');
            }
            
            // 顯示卡片
            cardsContainer.innerHTML = currentDraw.cards.map(item => {
                const orientationClass = item.isReversed ? 'reversed' : 'upright';
                const orientationText = item.isReversed ? '逆位' : '正位';
                const keywords = item.cardData.keywords.map(kw => 
                    `<span class="keyword-tag">${kw}</span>`
                ).join('');
                
                return `
                    <div class="card-item">
                        <div class="card-position">${item.position.name}</div>
                        <div class="card-name">${item.card.name}</div>
                        <div class="card-orientation ${orientationClass}">${orientationText}</div>
                        <div class="card-keywords">
                            <strong>關鍵字：</strong><br>
                            ${keywords}
                        </div>
                        <div class="card-description">
                            ${item.cardData.desc}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 生成總結
            const summary = generateSummary();
            summaryText.textContent = summary;
            
            // 顯示結果區
            resultsSection.classList.add('show');
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 生成總結
        function generateSummary() {
            if (!currentDraw) return '';
            
            const cards = currentDraw.cards;
            const questionPrefix = currentDraw.question ? 
                `關於「${currentDraw.question}」的解讀：` : '整體解讀：';
            
            const pastKeywords = cards[0].cardData.keywords.join('、');
            const presentKeywords = cards[1].cardData.keywords.join('、');
            const futureKeywords = cards[2].cardData.keywords.join('、');
            
            const pastCard = cards[0].card.name.split(' ')[0];
            const presentCard = cards[1].card.name.split(' ')[0];
            const futureCard = cards[2].card.name.split(' ')[0];
            
            const pastOrientation = cards[0].isReversed ? '逆位' : '正位';
            const presentOrientation = cards[1].isReversed ? '逆位' : '正位';
            const futureOrientation = cards[2].isReversed ? '逆位' : '正位';
            
            return `${questionPrefix}\n\n` +
                `在過去的位置，${pastOrientation}的${pastCard}顯示了${pastKeywords}的能量，` +
                `這些過往的經驗和影響塑造了當前的情況。\n\n` +
                `目前的狀態由${presentOrientation}的${presentCard}所代表，帶來${presentKeywords}的特質，` +
                `這是你現在需要面對和理解的核心課題。\n\n` +
                `展望未來，${futureOrientation}的${futureCard}預示著${futureKeywords}的發展方向。` +
                `從過去的經驗中學習，善用當下的資源，你將能夠朝著更好的方向前進。\n\n` +
                `記住，塔羅牌提供的是可能性和指引，真正的力量在於你如何運用這些洞見來做出選擇。`;
        }

        // 複製結果
        function copyResults() {
            if (!currentDraw) {
                showToast('尚未抽牌，無結果可複製');
                return;
            }
            
            const question = currentDraw.question ? `問題：${currentDraw.question}\n` : '';
            const timestamp = `抽牌時間：${currentDraw.timestamp.toLocaleString('zh-TW')}\n`;
            const setting = `牌陣：三張牌（過去/現在/未來）\n逆位設定：${currentDraw.allowReversed ? '允許逆位' : '不允許逆位'}\n\n`;
            
            const cardsText = currentDraw.cards.map(item => {
                const orientation = item.isReversed ? '逆位' : '正位';
                const keywords = item.cardData.keywords.join('、');
                return `【${item.position.name}】${item.card.name}（${orientation}）\n` +
                       `關鍵字：${keywords}\n` +
                       `${item.cardData.desc}\n`;
            }).join('\n');
            
            const summary = `\n【整體解讀】\n${generateSummary()}`;
            
            const fullText = `🔮 塔羅牌抽牌結果\n\n${timestamp}${question}${setting}${cardsText}${summary}`;
            
            // 嘗試使用現代 API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullText)
                    .then(() => showToast('已複製到剪貼簿！'))
                    .catch(err => {
                        console.error('複製失敗：', err);
                        fallbackCopy(fullText);
                    });
            } else {
                fallbackCopy(fullText);
            }
        }

        // Fallback 複製方法
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast('已複製到剪貼簿！');
                } else {
                    showToast('複製失敗，請手動複製');
                }
            } catch (err) {
                console.error('複製失敗：', err);
                showToast('複製失敗，請手動複製');
            }
            
            document.body.removeChild(textarea);
        }

        // 顯示提示訊息
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 重置所有
        function resetAll() {
            document.getElementById('question').value = '';
            document.getElementById('reversed').value = 'true';
            document.getElementById('results').classList.remove('show');
            currentDraw = null;
            showToast('已重置');
        }
    </script>
</body>
</html>
